<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clip 3 — The Scan</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/gh/snd-lib/snd-lib@v1.2.4/dist/browser/snd.js?kit=01"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #09090B; color: #A1A1AA;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    width: 1080px; height: 1920px;
  }
  .film { position: relative; width: 100%; height: 100%; }
  .scene {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.8s ease; pointer-events: none; padding: 0 80px;
  }
  .scene.active { opacity: 1; pointer-events: auto; }
  .start-screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 50; cursor: pointer; transition: opacity 0.8s ease;
  }
  .start-screen.hidden { opacity: 0; pointer-events: none; }
  .play-btn {
    width: 100px; height: 100px; border-radius: 50%; border: 1px solid #27272A;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 40px; transition: border-color 0.3s, transform 0.3s;
  }
  .start-screen:hover .play-btn { border-color: #D4A843; transform: scale(1.05); }
  .play-btn svg { margin-left: 6px; }
  .start-label { font-family: 'Geist Mono', monospace; font-size: 14px; color: #27272A; letter-spacing: 0.12em; }
  .line-reveal { opacity: 0; transform: translateY(10px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .line-reveal.show { opacity: 1; transform: translateY(0); }
  .scene-text { font-size: 32px; color: #71717A; line-height: 1.7; max-width: 900px; text-align: center; }
  .scene-text em { color: #E8E4DE; font-style: normal; font-weight: 500; }
  .scene-text .dim { color: #3F3F46; }
  .big-text { font-size: 56px; font-weight: 600; color: #E8E4DE; line-height: 1.2; letter-spacing: -0.03em; text-align: center; max-width: 900px; }
  .mono-label { font-family: 'Geist Mono', monospace; font-size: 14px; color: #27272A; letter-spacing: 0.12em; margin-bottom: 32px; }
  .scan-demo {
    width: 100%; max-width: 900px; margin-top: 32px;
    border: 1px solid #1E1E22; border-radius: 6px; overflow: hidden; background: #0C0C0E;
  }
  .scan-row {
    display: flex; align-items: center; padding: 18px 28px; gap: 16px;
    border-bottom: 1px solid #141416;
    font-family: 'Geist Mono', monospace; font-size: 18px;
    opacity: 0; transform: translateY(6px); transition: opacity 0.4s, transform 0.4s;
  }
  .scan-row.show { opacity: 1; transform: translateY(0); }
  .scan-row:last-child { border-bottom: none; }
  .sr-name { color: #A1A1AA; font-weight: 600; width: 220px; flex-shrink: 0; }
  .sr-branch { color: #3F3F46; font-size: 14px; flex: 1; }
  .sr-dirty { color: #52525B; font-size: 14px; width: 80px; text-align: right; }
  .sr-score { font-weight: 700; width: 40px; text-align: right; }
  .progress-bar { position: fixed; bottom: 0; left: 0; height: 3px; background: #D4A843; z-index: 100; transition: width 0.3s linear; }
  .counter { position: fixed; bottom: 24px; right: 32px; font-family: 'Geist Mono', monospace; font-size: 14px; color: #1E1E22; letter-spacing: 0.06em; z-index: 100; }
</style>
</head>
<body>
<div class="film">
  <div class="start-screen" id="startScreen" onclick="startFilm()">
    <div class="mono-label">CLIP 3 / 4</div>
    <div class="play-btn"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M8 5v14l11-7L8 5z" fill="#52525B"/></svg></div>
    <div class="start-label">TAP TO PLAY</div>
  </div>

  <div class="scene" id="s0">
    <div class="mono-label line-reveal">/resume</div>
    <div class="big-text line-reveal">17 repos scanned</div>
  </div>

  <div class="scene" id="s1">
    <div class="scan-demo">
      <div class="scan-row" id="sr0"><span class="sr-name">coinrotator</span><span class="sr-branch">sandbox</span><span class="sr-dirty">20 dirty</span><span class="sr-score" style="color:#5CB87A">42</span></div>
      <div class="scan-row" id="sr1"><span class="sr-name">shumi-bot</span><span class="sr-branch">main</span><span class="sr-dirty">1 dirty</span><span class="sr-score" style="color:#5CB87A">38</span></div>
      <div class="scan-row" id="sr2"><span class="sr-name">coinrotator-utils</span><span class="sr-branch">feat/holder-cohort-tool</span><span class="sr-dirty">3 dirty</span><span class="sr-score" style="color:#D4A843">36</span></div>
      <div class="scan-row" id="sr3"><span class="sr-name">coinrotator-backend</span><span class="sr-branch">feat/holder-cohorts-tool</span><span class="sr-dirty">10 dirty</span><span class="sr-score" style="color:#D4A843">36</span></div>
      <div class="scan-row" id="sr4"><span class="sr-name">shumi-landing</span><span class="sr-branch">renderer-test</span><span class="sr-dirty">0 dirty</span><span class="sr-score" style="color:#3F3F46">17</span></div>
    </div>
  </div>

  <div class="scene" id="s2">
    <div class="scene-text line-reveal">Five repos active. Twelve stashes.</div>
    <div class="scene-text line-reveal" style="margin-top:24px"><span class="dim">Normal operating state.</span></div>
  </div>
</div>

<div class="progress-bar" id="progressBar"></div>
<div class="counter" id="counter"></div>

<script>
const snd = new Snd(); snd.load(Snd.KITS.SND01);

const scenes = [
  { id:'s0', dur:3500 },
  { id:'s1', dur:6000, scanRows:['sr0','sr1','sr2','sr3','sr4'] },
  { id:'s2', dur:4000 },
];

let current = -1, running = false;
const total = scenes.length;

function startFilm() {
  document.getElementById('startScreen').classList.add('hidden');
  running = true; nextScene();
}

function nextScene() {
  if (!running) return;
  if (current >= 0) document.getElementById(scenes[current].id).classList.remove('active');
  current++;
  if (current >= total) { running = false; return; }
  const s = scenes[current];
  const el = document.getElementById(s.id);
  el.classList.add('active');
  document.getElementById('counter').textContent = String(current+1).padStart(2,'0')+'/'+String(total).padStart(2,'0');
  document.getElementById('progressBar').style.width = ((current+1)/total*100)+'%';

  try { snd.play(Snd.SOUNDS.TRANSITION_UP); } catch(e) {}

  el.querySelectorAll('.line-reveal').forEach((r,i) => setTimeout(() => { r.classList.add('show'); try { snd.play(Snd.SOUNDS.TAP); } catch(e) {} }, 300+i*600));
  if (s.scanRows) {
    s.scanRows.forEach((id,i) => setTimeout(() => { document.getElementById(id).classList.add('show'); try { snd.play(Snd.SOUNDS.SELECT); } catch(e) {} }, 600+i*500));
  }
  setTimeout(nextScene, s.dur);
}

document.addEventListener('keydown', e => { if (e.code==='Space') { e.preventDefault(); if (current<0) startFilm(); } });
</script>
</body>
</html>
