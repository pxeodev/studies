<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clip 1 — The Leak</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/gh/snd-lib/snd-lib@v1.2.4/dist/browser/snd.js?kit=01"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #09090B; color: #A1A1AA;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    width: 1080px; height: 1920px;
  }
  .film { position: relative; width: 100%; height: 100%; }
  .scene {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.8s ease; pointer-events: none; padding: 0 80px;
  }
  .scene.active { opacity: 1; pointer-events: auto; }
  .start-screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 50; cursor: pointer; transition: opacity 0.8s ease;
  }
  .start-screen.hidden { opacity: 0; pointer-events: none; }
  .play-btn {
    width: 100px; height: 100px; border-radius: 50%; border: 1px solid #27272A;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 40px; transition: border-color 0.3s, transform 0.3s;
  }
  .start-screen:hover .play-btn { border-color: #D4A843; transform: scale(1.05); }
  .play-btn svg { margin-left: 6px; }
  .start-label { font-family: 'Geist Mono', monospace; font-size: 14px; color: #27272A; letter-spacing: 0.12em; }
  .line-reveal { opacity: 0; transform: translateY(10px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .line-reveal.show { opacity: 1; transform: translateY(0); }
  .scene-text { font-size: 32px; color: #71717A; line-height: 1.7; max-width: 900px; text-align: center; }
  .scene-text em { color: #E8E4DE; font-style: normal; font-weight: 500; }
  .scene-text .dim { color: #3F3F46; }
  .big-text { font-size: 56px; font-weight: 600; color: #E8E4DE; line-height: 1.2; letter-spacing: -0.03em; text-align: center; max-width: 900px; }
  .big-text .sub { font-size: 28px; font-weight: 400; color: #52525B; margin-top: 20px; display: block; }
  .quote-text { font-size: 44px; font-weight: 500; color: #E8E4DE; line-height: 1.3; letter-spacing: -0.02em; text-align: center; max-width: 800px; font-style: italic; }
  .mono-label { font-family: 'Geist Mono', monospace; font-size: 14px; color: #27272A; letter-spacing: 0.12em; margin-bottom: 32px; }
  .term {
    background: #0C0C0E; border: 1px solid #1E1E22; border-radius: 6px;
    width: 100%; max-width: 900px; margin-top: 40px; overflow: hidden;
  }
  .term-bar { display: flex; gap: 8px; padding: 14px 18px; border-bottom: 1px solid #1E1E22; }
  .term-dot { width: 10px; height: 10px; border-radius: 50%; }
  .term-body { padding: 24px 28px; font-family: 'Geist Mono', monospace; font-size: 18px; line-height: 2.4; }
  .term-line { opacity: 0; transform: translateY(4px); transition: opacity 0.3s, transform 0.3s; }
  .term-line.show { opacity: 1; transform: translateY(0); }
  .t-prompt { color: #3F3F46; } .t-cmd { color: #A1A1AA; } .t-dim { color: #27272A; }
  .t-out { color: #52525B; } .t-ok { color: #5CB87A; } .t-red { color: #C45B4F; }
  .progress-bar { position: fixed; bottom: 0; left: 0; height: 3px; background: #D4A843; z-index: 100; transition: width 0.3s linear; }
  .counter { position: fixed; bottom: 24px; right: 32px; font-family: 'Geist Mono', monospace; font-size: 14px; color: #1E1E22; letter-spacing: 0.06em; z-index: 100; }
</style>
</head>
<body>
<div class="film">
  <div class="start-screen" id="startScreen" onclick="startFilm()">
    <div class="mono-label">CLIP 1 / 4</div>
    <div class="play-btn"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M8 5v14l11-7L8 5z" fill="#52525B"/></svg></div>
    <div class="start-label">TAP TO PLAY</div>
  </div>

  <div class="scene" id="s0">
    <div class="mono-label line-reveal">STUDY 003</div>
    <div class="scene-text line-reveal">The AI was asked to show env keys.</div>
    <div class="scene-text line-reveal" style="margin-top:16px">The operator was <em>screen recording</em>.</div>
  </div>

  <div class="scene" id="s1">
    <div class="term line-reveal">
      <div class="term-bar"><div class="term-dot" style="background:#C45B4F"></div><div class="term-dot" style="background:#D4A843"></div><div class="term-dot" style="background:#5CB87A"></div></div>
      <div class="term-body" id="t0"></div>
    </div>
  </div>

  <div class="scene" id="s2">
    <div class="big-text line-reveal" style="color:#C45B4F">Both values on camera.</div>
  </div>

  <div class="scene" id="s3">
    <div class="scene-text line-reveal">Two <em>NEXT_PUBLIC_</em> endpoints.</div>
    <div class="scene-text line-reveal" style="margin-top:16px">Public by design. Ships in the bundle.</div>
    <div class="scene-text line-reveal" style="margin-top:32px"><span class="dim">The assistant didn't know it was being recorded.</span></div>
  </div>
</div>

<div class="progress-bar" id="progressBar"></div>
<div class="counter" id="counter"></div>

<script>
const snd = new Snd(); snd.load(Snd.KITS.SND01);

const scenes = [
  { id:'s0', dur:4000 },
  { id:'s1', dur:5500, term:'t0', lines:[
    '<span class="t-prompt">$</span> <span class="t-cmd">cat .env.example</span>',
    '<span class="t-out">NEXT_PUBLIC_SHUMI_API_ENDPOINT=</span><span class="t-red">████████████</span>',
    '<span class="t-out">NEXT_PUBLIC_SHUMI_SUGGESTIONS_ENDPOINT=</span><span class="t-red">████████████</span>',
  ]},
  { id:'s2', dur:3000, sound:'caution' },
  { id:'s3', dur:5000 },
];

let current = -1, running = false;
const total = scenes.length;

function startFilm() {
  document.getElementById('startScreen').classList.add('hidden');
  running = true; nextScene();
}

function nextScene() {
  if (!running) return;
  if (current >= 0) document.getElementById(scenes[current].id).classList.remove('active');
  current++;
  if (current >= total) { running = false; return; }
  const s = scenes[current];
  const el = document.getElementById(s.id);
  el.classList.add('active');
  document.getElementById('counter').textContent = String(current+1).padStart(2,'0')+'/'+String(total).padStart(2,'0');
  document.getElementById('progressBar').style.width = ((current+1)/total*100)+'%';

  try { snd.play(Snd.SOUNDS.TRANSITION_UP); } catch(e) {}
  if (s.sound === 'caution') try { setTimeout(() => snd.play(Snd.SOUNDS.CAUTION), 400); } catch(e) {}

  el.querySelectorAll('.line-reveal').forEach((r,i) => setTimeout(() => { r.classList.add('show'); try { snd.play(Snd.SOUNDS.TAP); } catch(e) {} }, 300+i*600));
  if (s.term && s.lines) {
    const b = document.getElementById(s.term); b.innerHTML = '';
    s.lines.forEach((l,i) => { const d = document.createElement('div'); d.className='term-line'; d.innerHTML=l; b.appendChild(d); setTimeout(() => { d.classList.add('show'); try { snd.play(Snd.SOUNDS.TYPE); } catch(e) {} }, 800+i*800); });
  }
  setTimeout(nextScene, s.dur);
}

document.addEventListener('keydown', e => { if (e.code==='Space') { e.preventDefault(); if (current<0) startFilm(); } });
</script>
</body>
</html>
