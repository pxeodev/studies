<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Redirect</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h3 { margin: 0 0 10px 0; font-size: 24px; }
        p { margin: 0; opacity: 0.8; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h3>Completing Authentication...</h3>
        <p>Please wait while we redirect you back to the application.</p>
    </div>
    
    <script>
        console.log('🔄 Web3Auth redirect page loaded');
        console.log('🔧 Current URL:', window.location.href);
        console.log('🔧 Referrer:', document.referrer);
        
        try {
            // Check for authentication parameters
            const urlParams = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            
            const hasAuthData = urlParams.has('code') || 
                               urlParams.has('state') || 
                               hashParams.has('access_token') ||
                               hashParams.has('id_token');
            
            console.log('🔧 Auth data present:', hasAuthData);
            
            if (hasAuthData) {
                console.log('✅ Authentication data detected, processing...');
            }
            
            // Let Web3Auth handle the redirect automatically
            // The Web3Auth SDK will process this page and redirect back
            
            // Fallback redirect after 5 seconds
            setTimeout(() => {
                console.log('🔄 Fallback redirect triggered');
                if (window.opener && !window.opener.closed) {
                    console.log('🔄 Closing popup window');
                    window.close();
                } else {
                    console.log('🔄 Redirecting to home page');
                    window.location.href = '/';
                }
            }, 5000);
            
        } catch (error) {
            console.error('❌ Redirect page error:', error);
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        }
    </script>
</body>
</html>
