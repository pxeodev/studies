services:
  - type: web
    name: coinrotator
    runtime: node
    plan: starter
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production


  - type: cron
    name: oscillator-calc
    schedule: "0 2 * * *"
    runtime: node
    buildCommand: npm install --legacy-peer-deps
    startCommand: node scripts/calculate-oscillators.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromService:
          type: web
          name: coinrotator
          envVarKey: DATABASE_URL
