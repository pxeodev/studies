<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shumi - Trade Intelligence on Autopilot</title>
    <link href="https://fonts.googleapis.com/css2?family=Tektur:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tektur', monospace;
            background-color: #1c1c1e;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            width: 100%;
            flex: 1;
            gap: 296px;
        }

        /* Header Styles */
        .header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            width: 100%;
            padding: 16px 0;
            background-color: #1c1c1e;
            border-bottom: 1px solid #202023;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin: 0 32px;
        }

        .logo {
            width: 104px;
            height: 32px;
        }

        .connect-btn {
            background-color: #1d5151;
            color: #ffffff;
            font-size: 16px;
            font-family: 'Tektur', monospace;
            font-weight: 600;
            line-height: 21px;
            text-align: left;
            text-transform: lowercase;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .connect-btn:hover {
            background-color: #2a6b6b;
            transform: translateY(-2px);
        }

        /* Main Content Styles */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 296px;
            justify-content: flex-start;
            align-items: center;
            width: 100%;
            flex: 1;
        }

        .hero-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: flex-start;
            align-items: center;
            width: 100%;
            margin: 0 320px;
        }

        .alpha-badge {
            background-color: #1d2e52;
            color: #ffffff;
            font-size: 16px;
            font-family: 'Tektur', monospace;
            font-weight: 600;
            line-height: 21px;
            text-align: left;
            text-transform: lowercase;
            border: none;
            border-radius: 8px;
            padding: 4px 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .alpha-badge:hover {
            background-color: #2a4a7a;
        }

        .hero-text-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            justify-content: flex-start;
            align-items: center;
            width: 100%;
        }

        .main-heading {
            font-size: 40px;
            font-family: 'Tektur', monospace;
            font-weight: 600;
            line-height: 56px;
            text-align: center;
            text-transform: lowercase;
            color: #ffffff;
            width: auto;
        }

        .description-text {
            font-size: 24px;
            font-family: 'Tektur', monospace;
            font-weight: 500;
            line-height: 32px;
            text-align: center;
            text-transform: lowercase;
            color: #8f8fa3cc;
            width: 100%;
        }

        .cta-buttons {
            display: flex;
            flex-direction: row;
            gap: 12px;
            justify-content: center;
            align-items: center;
            width: auto;
        }

        .cta-btn-primary {
            background-color: #1d5151;
            color: #ffffff;
            font-size: 16px;
            font-family: 'Tektur', monospace;
            font-weight: 600;
            line-height: 21px;
            text-align: left;
            text-transform: lowercase;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cta-btn-primary:hover {
            background-color: #2a6b6b;
            transform: translateY(-2px);
        }

        .cta-btn-secondary {
            background-color: #2e2e33;
            color: #ffffff;
            font-size: 16px;
            font-family: 'Tektur', monospace;
            font-weight: 600;
            line-height: 21px;
            text-align: left;
            text-transform: lowercase;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cta-btn-secondary:hover {
            background-color: #3e3e43;
            transform: translateY(-2px);
        }

        /* Footer Styles */
        .footer {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            width: 100%;
            padding: 16px 0;
            background-color: #1c1c1e;
            border-top: 1px solid #202023;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin: 0 32px;
        }

        .copyright {
            font-size: 16px;
            font-family: 'Tektur', monospace;
            font-weight: 600;
            line-height: 21px;
            text-align: left;
            text-transform: lowercase;
            color: #9090a3;
        }

        .footer-links {
            display: flex;
            flex-direction: row;
            gap: 20px;
            justify-content: center;
            align-items: center;
            width: auto;
        }

        .footer-link {
            font-size: 16px;
            font-family: 'Tektur', monospace;
            font-weight: 600;
            line-height: 21px;
            text-align: left;
            text-transform: lowercase;
            color: #9090a3;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .footer-link:hover {
            color: #ffffff;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .header-content {
                margin: 0 16px;
            }

            .hero-section {
                margin: 0 16px;
            }

            .main-heading {
                font-size: 28px;
                line-height: 40px;
            }

            .description-text {
                font-size: 18px;
                line-height: 26px;
            }

            .cta-buttons {
                flex-direction: column;
                gap: 8px;
            }

            .footer-content {
                margin: 0 16px;
                flex-direction: column;
                gap: 16px;
            }

            .footer-links {
                flex-wrap: wrap;
                gap: 12px;
            }

            .main-container {
                gap: 150px;
            }
        }

        @media (max-width: 480px) {
            .main-heading {
                font-size: 24px;
                line-height: 32px;
            }

            .description-text {
                font-size: 16px;
                line-height: 22px;
            }

            .connect-btn,
            .cta-btn-primary,
            .cta-btn-secondary,
            .alpha-badge {
                font-size: 14px;
                padding: 6px 12px;
            }

            .main-container {
                gap: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <img src="./assets/images/img_header_logo.png" alt="Shumi Logo" class="logo" />
                <button class="connect-btn" onclick="connectToShumi()">Connect to Shumi</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <section class="hero-section">
                <button class="alpha-badge">alpha access</button>
                
                <div class="hero-text-section">
                    <h1 class="main-heading">trade intelligence on autopilot <br />with 🍄 shumi</h1>
                    <p class="description-text">TerraUSD TRON avalanche stacks tether stellar celsius uniswap dash celo horizen zcash livepeer stellar PancakeSwap shiba-inu</p>
                </div>

                <div class="cta-buttons">
                    <button class="cta-btn-primary" onclick="connectToShumi()">Connect to Shumi</button>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <p class="copyright">© shumi · 2025</p>
                <div class="footer-links">
                    <a href="https://x.com/CoinRotatorApp" class="footer-link" target="_blank">📄 docs</a>
                    <a href="https://x.com/CoinRotatorApp" class="footer-link" target="_blank">🐦 twitter</a>
                    <a href="https://discord.gg/URARqw2KAS" class="footer-link" target="_blank">💬 discord</a>
                    <a href="https://app.virtuals.io/geneses/6667" class="footer-link" target="_blank">🚀 virtuals launch</a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        function connectToShumi() {
            // Redirect to Shumi platform
            window.open('https://Coinrotator.app/shumi', '_blank');
        }

        // Add smooth scroll behavior for better UX
        document.addEventListener('DOMContentLoaded', function() {
            // Add any initialization code here
            console.log('Shumi platform loaded successfully');
        });
    </script>
</body>
</html>
